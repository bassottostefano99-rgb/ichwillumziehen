<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>OG Image Template</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 1200px; height: 630px; overflow: hidden; }
    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: #0e0e0e;
      color: #f0ede8;
      position: relative;
    }

    /* Subtle radial accent glow, lime, top-right */
    body::before {
      content: '';
      position: absolute;
      top: -300px; right: -300px;
      width: 800px; height: 800px;
      background: radial-gradient(circle, rgba(200,240,96,0.18) 0%, rgba(200,240,96,0) 65%);
      pointer-events: none;
    }

    /* Lime accent bar on left edge */
    body::after {
      content: '';
      position: absolute;
      left: 0; top: 0;
      width: 8px; height: 100%;
      background: #c8f060;
    }

    .frame {
      position: relative;
      width: 100%; height: 100%;
      padding: 70px 90px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .top {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .top .brand {
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      font-size: 22px;
      letter-spacing: 0.02em;
      color: #f0ede8;
    }

    .top .dot {
      width: 10px; height: 10px;
      background: #c8f060;
      border-radius: 50%;
    }

    .headline {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: 92px;
      line-height: 1.05;
      color: #f0ede8;
      letter-spacing: -0.01em;
      max-width: 880px;
    }

    .headline em {
      font-style: italic;
      color: #c8f060;
    }

    .bottom {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 40px;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      max-width: 760px;
    }

    .tag {
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
      font-size: 19px;
      color: #f0ede8;
      padding: 8px 16px;
      border: 0.5px solid #2a2a2a;
      border-radius: 100px;
      background: #161616;
    }

    .tag.accent {
      border-color: #c8f060;
      background: #1a2000;
      color: #c8f060;
    }

    .url {
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      font-size: 18px;
      color: #666;
      letter-spacing: 0.02em;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div class="frame">
    <div class="top">
      <div class="dot"></div>
      <div class="brand">ichwillumziehen.com</div>
    </div>

    <h1 class="headline">
      Kannst du dir<br>
      die Wohnung <em>leisten?</em>
    </h1>

    <div class="bottom">
      <div class="tags">
        <span class="tag accent">Mietrechner</span>
        <span class="tag accent">Umzugsbudget</span>
        <span class="tag">21 deutsche Städte</span>
        <span class="tag">Kostenlos &middot; Ohne Anmeldung</span>
      </div>
      <div class="url">→ ichwillumziehen.com</div>
    </div>
  </div>
</body>
</html>
